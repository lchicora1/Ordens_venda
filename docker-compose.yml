services:
  postgres:
    image: postgres:16
    container_name: ovgs-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ovgs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: ovgs-migrate
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ovgs
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    container_name: ovgs-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ovgs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  studio:
    image: node:20
    container_name: ovgs-prisma-studio
    working_dir: /app
    volumes:
      - .:/app
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ovgs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: